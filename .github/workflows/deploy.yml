name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 중요: 깃허브 시크릿에 저장된 내용을 파일로 복원합니다.
      - name: Create application-secret.properties
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_SECRET }}" > src/main/resources/application-secret.properties

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      # 빌드된 jar 파일을 결과물(Artifact)로 보관합니다.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: target/*.jar
            -
      # 빌드된 JAR 파일을 오라클 서버로 복사 (SCP 사용)
      - name: Copy JAR to OCI Instance
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app"  # 서버 내 저장할 폴더 (미리 만들어두세요!)
          strip_components: 1

      # 서버에서 기존 앱을 끄고 새 앱 실행 (SSH 사용)
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          script: |
            # 1. 기존 실행 중인 자바 프로세스 종료 (있다면)
            fuser -k 8080/tcp || true
            
            # 2. 새 jar 파일 실행
            cd /home/ubuntu/app
            nohup java -jar *.jar > app.log 2>&1 &