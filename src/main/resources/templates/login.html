<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - Raid Together</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- 로고 -->
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg viewBox="0 0 16 16" fill="white" width="16" height="16">
            <path d="M8 1l2 4h4l-3 3 1 4-4-2.5L4 12l1-4L2 5h4z"/>
          </svg>
        </div>
        <span class="auth-logo-text">Raid Together</span>
      </div>

      <h1 class="auth-title">로그인</h1>
      <p class="auth-subtitle">길드원 전용 서비스입니다</p>

      <!-- Google 로그인 -->
      <button class="google-btn" id="btn-google-login">
        <svg class="google-icon" viewBox="0 0 18 18" width="18" height="18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
          <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Google 계정으로 로그인
      </button>

      <div class="auth-divider"><span>또는</span></div>

      <!-- 이메일 로그인 폼 -->
      <form id="form-login" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">이메일</label>
          <input class="form-input" type="email" id="login-email" placeholder="example@gmail.com" autocomplete="email" required />
        </div>
        <div class="form-group" style="margin-top:10px;">
          <label class="form-label" for="login-password">비밀번호</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <p class="form-hint error hidden" id="login-error"></p>
        <button class="btn btn-primary auth-submit-btn" type="submit" id="btn-login">로그인</button>
      </form>

      <!-- 승인 대기 배너 (로그인 후 PENDING 상태 시 노출) -->
      <div class="auth-pending hidden" id="pending-banner">
        <p class="auth-pending-title">승인 대기 중</p>
        <p class="auth-pending-body">관리자 승인 후 서비스를 이용하실 수 있습니다.</p>
      </div>

      <!-- 계정 잠금 배너 -->
      <div class="auth-locked hidden" id="locked-banner">
        <p class="auth-pending-title">계정 정지</p>
        <p class="auth-pending-body">계정이 정지되었습니다. 관리자에게 문의하세요.</p>
      </div>

      <p class="auth-switch">
        아직 회원이 아니신가요?
        <a href="/register">회원가입</a>
      </p>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    AuthPage.initLogin();
  </script>
</body>
</html>
